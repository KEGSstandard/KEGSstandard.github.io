<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>KEGS Standard</title>
    <link rel="icon" type="image/png" href="favicon.png">

    <!-- Guardian-style font -->
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@900&display=swap" rel="stylesheet">

    <style>
      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: #f7f7f7;
      }

      /* HEADER */
      .header {
        background-color: #cc0000; /* KEGS red */
        padding: 15px 25px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      /* LEFT NAV (News + Sport) */
      .nav-left {
        display: flex;
        gap: 25px;
      }

      .nav-left a {
        color: white;
        font-size: 22px;
        font-weight: 700;
        text-decoration: none;
        padding-bottom: 4px;
      }

      .nav-left a:hover {
        border-bottom: 3px solid white;
      }

      /* RIGHT TITLE (KEGS Standard stacked) */
      .title-right {
        text-align: right;
        color: white;
        font-family: 'Merriweather', serif;
        line-height: 0.9;
      }

      .title-right .top {
        font-size: 40px;
        font-weight: 900;
      }

      .title-right .bottom {
        font-size: 32px;
        font-weight: 900;
      }

      /* PAGE CONTENT */
      .content {
        padding: 30px;
        max-width: 900px;
        margin: auto;
        font-size: 20px;
      }

      /* COOKIES POPUP */
      .cookies-popup {
        position: fixed;
        bottom: -200px; /* hidden start */
        left: 0;
        right: 0;
        background: #222;
        color: white;
        padding: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 16px;
        box-shadow: 0 -4px 10px rgba(0,0,0,0.3);
        transition: bottom 0.6s ease; /* glide animation */
      }

      .cookies-popup.show {
        bottom: 0; /* glide in */
      }

      .cookies-buttons {
        display: flex;
        gap: 10px;
      }

      .cookies-popup button {
        background: #cc0000;
        color: white;
        border: none;
        padding: 10px 18px;
        font-size: 16px;
        cursor: pointer;
        border-radius: 4px;
      }

      .cookies-popup button:hover {
        background: #a80000;
      }

      .reject-btn {
        background: #555;
      }

      .reject-btn:hover {
        background: #333;
      }
    </style>
  </head>

  <body>

    <!-- HEADER -->
    <div class="header">

      <!-- LEFT SIDE: NEWS + SPORT -->
      <div class="nav-left">
        <a href="#">News</a>
        <a href="#">Sport</a>
      </div>

      <!-- RIGHT SIDE: KEGS STANDARD STACKED -->
      <div class="title-right">
        <div class="top">KEGS</div>
        <div class="bottom">Standard</div>
      </div>

    </div>

    <!-- PAGE CONTENT -->
    <div class="content">
      <h2>Hello, world!</h2>
      <p>This is my first website hosted on GitHub Pages.</p>
    </div>

    <!-- COOKIES POPUP -->
    <div class="cookies-popup" id="cookiesBar">
      <span>This website uses cookies to improve your experience.</span>

      <div class="cookies-buttons">
        <button onclick="hideCookies()">Accept All Cookies</button>
        <button class="reject-btn" onclick="hideCookies()">Reject Cookies</button>
      </div>
    </div>

    <script>
      // Slide in on page load
      window.onload = function() {
        document.getElementById('cookiesBar').classList.add('show');
      };

      // Slide out when either button is clicked
      function hideCookies() {
        document.getElementById('cookiesBar').classList.remove('show');
      }
    </script>

  </body>
</html>
