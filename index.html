<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>KEGS Standard</title>
    <link rel="icon" type="image/png" href="favicon.png">

    <style>
      /* Reset */
      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: #f7f7f7;
      }

      /* Header bar */
      .kegs-header {
        background-color: #cc0000; /* KEGS red */
        padding: 20px;
        text-align: center;
      }

      .kegs-title {
        color: white;
        font-size: 42px;
        font-weight: 900;
        letter-spacing: 1px;
        margin: 0;
      }

      /* Page content */
      .content {
        padding: 30px;
        max-width: 900px;
        margin: auto;
        font-size: 20px;
      }
    </style>
  </head>

  <body>

    <!-- KEGS Standard Title Bar -->
    <div class="kegs-header">
      <h1 class="kegs-title">KEGS Standard</h1>
    </div>

    <!-- Page Content -->
    <div class="content">
      <h2>Hello, world!</h2>
      <p>This is my first website hosted on GitHub Pages.</p>
    </div>

  </body>
</html>
