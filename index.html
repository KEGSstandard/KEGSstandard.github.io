<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>KEGS Standard</title>
    <link rel="icon" type="image/png" href="favicon.png">

    <!-- Guardian-style font -->
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@900&display=swap" rel="stylesheet">

    <style>
      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: #f7f7f7;
      }

      /* Guardian-style title bar */
      .kegs-header {
        background-color: #cc0000; /* KEGS red */
        padding: 25px 0;
        text-align: center;
      }

      .kegs-title {
        font-family: 'Merriweather', serif;
        color: white;
        font-size: 48px;
        font-weight: 900;
        margin: 0;
        letter-spacing: 0.5px;
      }

      /* Page content */
      .content {
        padding: 30px;
        max-width: 900px;
        margin: auto;
        font-size: 20px;
      }

      /* Cookies popup */
      .cookies-popup {
        position: fixed;
        bottom: -200px; /* start hidden */
        left: 0;
        right: 0;
        background: #222;
        color: white;
        padding: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 16px;
        box-shadow: 0 -4px 10px rgba(0,0,0,0.3);
        transition: bottom 0.6s ease; /* glide animation */
      }

      .cookies-popup.show {
        bottom: 0; /* glide in */
      }

      .cookies-buttons {
        display: flex;
        gap: 10px;
      }

      .cookies-popup button {
        background: #cc0000;
        color: white;
        border: none;
        padding: 10px 18px;
        font-size: 16px;
        cursor: pointer;
        border-radius: 4px;
      }

      .cookies-popup button:hover {
        background: #a80000;
      }

      .reject-btn {
        background: #555;
      }

      .reject-btn:hover {
        background: #333;
      }
    </style>
  </head>

  <body>

    <!-- KEGS Standard Title Bar -->
    <div class="kegs-header">
      <h1 class="kegs-title">KEGS Standard</h1>
    </div>

    <!-- Page Content -->
    <div class="content">
      <h2>Hello, world!</h2>
      <p>This is my first website hosted on GitHub Pages.</p>
    </div>

    <!-- Cookies Popup -->
    <div class="cookies-popup" id="cookiesBar">
      <span>This website uses cookies to improve your experience.</span>

      <div class="cookies-buttons">
        <button onclick="hideCookies()">Accept All Cookies</button>
        <button class="reject-btn" onclick="hideCookies()">Reject Cookies</button>
      </div>
    </div>

    <script>
      // Glide in after page loads
      window.onload = function() {
        document.getElementById('cookiesBar').classList.add('show');
      };

      // Glide out when either button is clicked
      function hideCookies() {
        document.getElementById('cookiesBar').classList.remove('show');
      }
    </script>

  </body>
</html>
