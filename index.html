<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>KEGS Standard</title>
    <link rel="icon" type="image/png" href="favicon.png">

    <!-- Guardian-style font -->
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@900&display=swap" rel="stylesheet">

    <style>
      /* Basic reset */
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: #f7f7f7;
        color: #111;
      }

      /* THICK HEADER */
      .header {
        background-color: #cc0000; /* KEGS red */
        padding: 28px 30px;       /* thicker bar */
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 20px;
      }

      /* LEFT NAV (Home, News, Sport) */
      .nav-left {
        display: flex;
        gap: 28px;
        align-items: center;
      }

      .nav-left a {
        color: white;
        font-size: 20px;
        font-weight: 700;
        text-decoration: none;
        padding: 6px 0;
        transition: opacity 0.15s ease, border-bottom 0.15s ease;
      }

      .nav-left a.active {
        border-bottom: 3px solid white;
      }

      .nav-left a:hover {
        opacity: 0.9;
      }

      /* RIGHT TITLE (stacked KEGS / Standard) */
      .title-right {
        text-align: right;
        color: white;
        font-family: 'Merriweather', serif;
        line-height: 0.9;
      }

      .title-right .top {
        font-size: 46px;
        font-weight: 900;
      }

      .title-right .bottom {
        font-size: 34px;
        font-weight: 900;
      }

      /* PAGE LAYOUT */
      .container {
        max-width: 1000px;
        margin: 28px auto;
        padding: 0 20px;
      }

      .content {
        background: white;
        padding: 28px;
        border-radius: 6px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        min-height: 220px;
        font-size: 18px;
      }

      /* COOKIES POPUP */
      .cookies-popup {
        position: fixed;
        bottom: -220px; /* hidden start */
        left: 0;
        right: 0;
        background: #222;
        color: white;
        padding: 18px 22px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 15px;
        box-shadow: 0 -6px 18px rgba(0,0,0,0.35);
        transition: bottom 0.6s cubic-bezier(.2,.9,.2,1); /* glide */
        z-index: 1200;
      }

      .cookies-popup.show {
        bottom: 18px; /* glide in */
      }

      .cookies-buttons {
        display: flex;
        gap: 10px;
      }

      .cookies-popup button {
        background: #cc0000;
        color: white;
        border: none;
        padding: 10px 16px;
        font-size: 15px;
        cursor: pointer;
        border-radius: 4px;
      }

      .cookies-popup button:hover { filter: brightness(0.92); }

      .reject-btn {
        background: #555;
      }

      .reject-btn:hover { filter: brightness(0.9); }

      /* Responsive tweaks */
      @media (max-width: 720px) {
        .header { padding: 18px 16px; }
        .nav-left a { font-size: 18px; gap: 16px; }
        .title-right .top { font-size: 34px; }
        .title-right .bottom { font-size: 24px; }
        .cookies-popup { font-size: 14px; padding: 14px; }
      }
    </style>
  </head>

  <body>

    <!-- HEADER -->
    <div class="header">
      <!-- LEFT NAV -->
      <nav class="nav-left" aria-label="Main navigation">
        <!-- Use full-path links so direct visits work; JS will intercept clicks to avoid reload -->
        <a href="/home" id="nav-home">Home</a>
        <a href="/news" id="nav-news">News</a>
        <a href="/sport" id="nav-sport">Sport</a>
      </nav>

      <!-- RIGHT STACKED TITLE -->
      <div class="title-right" aria-hidden="false">
        <div class="top">KEGS</div>
        <div class="bottom">Standard</div>
      </div>
    </div>

    <!-- MAIN CONTAINER -->
    <div class="container">
      <div class="content">

        <!-- Home section -->
        <section id="section-home">
          <h2>Hello, world!</h2>
          <p>This is my first website hosted on GitHub Pages.</p>
        </section>

        <!-- News section (hidden by default) -->
        <section id="section-news" style="display:none;">
          <h2>News</h2>
          <p>News</p>
        </section>

        <!-- Sport section (hidden by default) -->
        <section id="section-sport" style="display:none;">
          <h2>Sport</h2>
          <p>Sport</p>
        </section>

      </div>
    </div>

    <!-- COOKIES POPUP -->
    <div class="cookies-popup" id="cookiesBar" role="dialog" aria-live="polite">
      <span>This website uses cookies to improve your experience.</span>

      <div class="cookies-buttons">
        <button id="acceptBtn">Accept All Cookies</button>
        <button id="rejectBtn" class="reject-btn">Reject Cookies</button>
      </div>
    </div>

    <script>
      // Map path -> section name
      function pathToSection(path) {
        const p = (path || '/').replace(/\/+$/, ''); // remove trailing slash
        if (p === '' || p === '/' || p === '/home') return 'home';
        if (p === '/news') return 'news';
        if (p === '/sport') return 'sport';
        // default fallback
        return 'home';
      }

      // Show the named section and update active nav link
      function showSection(name, pushStatePath) {
        const sections = ['home','news','sport'];
        sections.forEach(s => {
          const el = document.getElementById('section-' + s);
          if (s === name) el.style.display = '';
          else el.style.display = 'none';
        });

        // update active nav link
        sections.forEach(s => {
          const link = document.getElementById('nav-' + s);
          if (s === name) link.classList.add('active');
          else link.classList.remove('active');
        });

        // update URL if requested
        if (pushStatePath) {
          history.pushState({section: name}, '', pushStatePath);
        }

        // scroll to top of content area for better UX
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }

      // Intercept nav clicks to avoid full reload and update URL
      function setupNavInterception() {
        const links = document.querySelectorAll('.nav-left a');
        links.forEach(link => {
          link.addEventListener('click', function(e) {
            // allow modifier keys to open in new tab
            if (e.metaKey || e.ctrlKey || e.shiftKey || e.altKey) return;
            e.preventDefault();
            const href = new URL(link.href, location.origin);
            const targetPath = href.pathname.replace(/\/+$/, '') || '/home';
            const section = pathToSection(targetPath);
            showSection(section, targetPath);
          });
        });
      }

      // Handle back/forward navigation
      window.addEventListener('popstate', function(event) {
        const section = pathToSection(location.pathname);
        showSection(section, null); // don't push state on pop
      });

      // Show cookies bar on load (glide in)
      window.addEventListener('load', function() {
        // Initialize nav interception
        setupNavInterception();

        // Determine initial section from URL
        const initial = pathToSection(location.pathname);
        // If user visits root '/', redirect to /home without reload for clarity
        if (location.pathname === '/' || location.pathname === '') {
          history.replaceState({section: 'home'}, '', '/home');
        } else {
          // ensure URL is normalized (e.g., trailing slash removed)
          const normalized = (location.pathname.replace(/\/+$/, '') || '/home');
          history.replaceState({section: initial}, '', normalized);
        }
        showSection(initial, null);

        // show cookies bar after a short delay
        setTimeout(function() {
          document.getElementById('cookiesBar').classList.add('show');
        }, 450);
      });

      // Slide out when either button clicked
      document.getElementById('acceptBtn').addEventListener('click', hideCookies);
      document.getElementById('rejectBtn').addEventListener('click', hideCookies);

      function hideCookies() {
        const bar = document.getElementById('cookiesBar');
        bar.classList.remove('show');
        // allow the glide-out to finish before fully hiding (optional)
        setTimeout(function(){ bar.style.display = 'none'; }, 650);
      }
    </script>

  </body>
</html>
